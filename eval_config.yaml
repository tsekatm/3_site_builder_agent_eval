models:
  claude-haiku:
    model_id: "claude-haiku"
    provider: "claude-code"
    params:
      cli_model: "haiku"
      timeout_seconds: 300
    tags: ["code-gen", "fast"]
    enabled: true

  deepseek-r1:
    model_id: "us.deepseek.r1-v1:0"
    region: "us-east-1"
    params:
      temperature: 0.3
      max_tokens: 8192
    tags: ["reasoning", "code-gen"]
    converse_api: false
    strip_think_blocks: true
    enabled: false  # Bedrock access revoked

  deepseek-v3.2:
    model_id: "deepseek.v3.2"
    region: "us-east-1"
    params:
      temperature: 0.2
      max_tokens: 8192
    tags: ["code-gen", "fast"]
    converse_api: true
    enabled: false  # Bedrock access revoked

  kimi-k2.5:
    model_id: "moonshotai.kimi-k2.5"
    region: "us-east-1"
    params:
      temperature: 0.2
      max_tokens: 16384
    tags: ["multimodal", "code-gen"]
    converse_api: true
    enabled: false  # Bedrock access revoked

judges:
  default:
    model_id: "claude-code-opus"
    provider: "claude-code"
    params:
      cli_model: "opus"
      timeout_seconds: 300
      max_budget_usd: 5

teachers:
  default:
    model_id: "claude-code-sonnet"
    provider: "claude-code"
    params:
      cli_model: "sonnet"
      timeout_seconds: 120

paths:
  gold_standards: "./gold-standards"
  templates: "../bigbeard-templates"
  runs: "./runs"
  violations: "./eval_core/scoring/violations.yaml"

aws:
  profile: "Tebogo-dev"

defaults:
  parallel_workers: 3
  parallel_prompts: 5
  timeout_seconds: 120
  judge_runs: 1
