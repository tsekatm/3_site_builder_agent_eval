models:
  routed:
    model_id: "multi-model-routed"
    provider: "routed"
    params: {}
    tags: ["multi-model", "optimised"]
    enabled: true

  claude-haiku:
    model_id: "claude-haiku"
    provider: "claude-code"
    params:
      cli_model: "haiku"
      timeout_seconds: 300
    tags: ["code-gen", "fast"]
    enabled: true

  deepseek-r1:
    model_id: "deepseek/deepseek-r1-0528"
    provider: "openrouter"
    params:
      temperature: 0.3
      max_tokens: 8192
      timeout_seconds: 600
    tags: ["reasoning", "code-gen"]
    strip_think_blocks: true
    enabled: false  # Dropped from eval (too slow, no tool calling)

  deepseek-v3.2:
    model_id: "deepseek/deepseek-v3.2"
    provider: "openrouter"
    params:
      temperature: 0.2
      max_tokens: 8192
      timeout_seconds: 600
    tags: ["code-gen", "fast"]
    enabled: true

  kimi-k2.5:
    model_id: "moonshotai/kimi-k2.5"
    provider: "openrouter"
    params:
      temperature: 0.2
      max_tokens: 16384
      timeout_seconds: 600
    tags: ["multimodal", "code-gen"]
    enabled: true

judges:
  default:
    model_id: "claude-code-opus"
    provider: "claude-code"
    params:
      cli_model: "opus"
      timeout_seconds: 300
      max_budget_usd: 5

teachers:
  default:
    model_id: "claude-code-sonnet"
    provider: "claude-code"
    params:
      cli_model: "sonnet"
      timeout_seconds: 120

paths:
  gold_standards: "./gold-standards"
  templates: "../bigbeard-templates"
  runs: "./runs"
  violations: "./eval_core/scoring/violations.yaml"

aws:
  profile: "Tebogo-dev"

defaults:
  parallel_workers: 3
  parallel_prompts: 5
  timeout_seconds: 120
  judge_runs: 1
